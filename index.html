<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light">
    <title>Client-Side QR Code Maker</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace" aria-label="QR code maker">
        <div class="editor-pane">
          <header class="topbar">
            <div>
              <h1>QR Code Maker</h1>
              <p>Static, browser-only QR generation.</p>
            </div>
            <div class="topbar-actions">
              <button class="ghost-button" id="exampleButton" type="button">Example</button>
              <button class="ghost-button" id="shareViewButton" type="button">Copy Share Link</button>
            </div>
          </header>

          <label class="field-label" for="contentType">Content type</label>
          <select id="contentType" class="select-control">
            <option value="text">Plain text</option>
            <option value="url">URL</option>
            <option value="email">Email</option>
            <option value="phone">Phone</option>
            <option value="sms">SMS</option>
            <option value="wifi">Wi-Fi</option>
          </select>

          <div class="template-panel" id="templatePanel" hidden>
            <div class="template-fields" data-template="url" hidden>
              <label>
                <span>URL</span>
                <input id="urlValue" type="url" inputmode="url" autocomplete="url" placeholder="https://example.com">
              </label>
            </div>

            <div class="template-fields" data-template="email" hidden>
              <label>
                <span>Email address</span>
                <input id="emailAddress" type="email" autocomplete="email" placeholder="name@example.com">
              </label>
              <label>
                <span>Subject</span>
                <input id="emailSubject" type="text" placeholder="Optional">
              </label>
              <label class="full-span">
                <span>Body</span>
                <textarea id="emailBody" class="template-textarea" placeholder="Optional"></textarea>
              </label>
            </div>

            <div class="template-fields" data-template="phone" hidden>
              <label>
                <span>Phone number</span>
                <input id="phoneNumber" type="tel" autocomplete="tel" placeholder="+1 555 0100">
              </label>
            </div>

            <div class="template-fields" data-template="sms" hidden>
              <label>
                <span>Phone number</span>
                <input id="smsNumber" type="tel" autocomplete="tel" placeholder="+1 555 0100">
              </label>
              <label class="full-span">
                <span>Message</span>
                <textarea id="smsMessage" class="template-textarea" placeholder="Optional"></textarea>
              </label>
            </div>

            <div class="template-fields" data-template="wifi" hidden>
              <label>
                <span>Network name</span>
                <input id="wifiSsid" type="text" autocomplete="off" placeholder="SSID">
              </label>
              <label>
                <span>Password</span>
                <input id="wifiPassword" type="text" autocomplete="off" placeholder="Optional">
              </label>
              <label class="checkbox-control">
                <input id="wifiSharePassword" type="checkbox">
                <span>Include password in share links</span>
              </label>
              <label>
                <span>Security</span>
                <select id="wifiSecurity" class="select-control">
                  <option value="WPA">WPA/WPA2</option>
                  <option value="WEP">WEP</option>
                  <option value="nopass">None</option>
                </select>
              </label>
              <label class="checkbox-control">
                <input id="wifiHidden" type="checkbox">
                <span>Hidden network</span>
              </label>
            </div>
          </div>

          <label class="field-label" for="qrInput">QR content</label>
          <textarea id="qrInput" spellcheck="false" autocomplete="off" autocapitalize="off" aria-describedby="qrInputHelp" placeholder="Paste a URL, contact info, Wi-Fi details, or any text"></textarea>
          <p class="field-help" id="qrInputHelp">Plain text is encoded exactly as entered.</p>

          <div class="controls-grid">
            <fieldset class="control-group">
              <legend>Error correction</legend>
              <div class="segmented" role="radiogroup" aria-label="Error correction level">
                <label><input type="radio" name="ecc" value="L"> Low</label>
                <label><input type="radio" name="ecc" value="M" checked> Medium</label>
                <label><input type="radio" name="ecc" value="Q"> Quartile</label>
                <label><input type="radio" name="ecc" value="H"> High</label>
              </div>
            </fieldset>

            <fieldset class="control-group size-control">
              <legend>Export size</legend>
              <div class="segmented size-presets" role="radiogroup" aria-label="Export size presets">
                <label><input type="radio" name="sizePreset" value="256"> 256</label>
                <label><input type="radio" name="sizePreset" value="512" checked> 512</label>
                <label><input type="radio" name="sizePreset" value="1024"> 1024</label>
                <label><input type="radio" name="sizePreset" value="2048"> 2048</label>
                <label><input type="radio" name="sizePreset" value="4096"> 4096</label>
              </div>
              <label class="number-control" for="sizeInput">
                <span>Custom px</span>
                <input id="sizeInput" type="number" min="160" max="4096" step="1" value="512" inputmode="numeric">
              </label>
            </fieldset>

            <label class="slider-control" for="marginInput">
              <span>Margin</span>
              <output id="marginOutput" for="marginInput">4</output>
              <input id="marginInput" type="range" min="0" max="10" step="1" value="4">
            </label>

            <div class="swatches" aria-label="QR colors">
              <label>
                <span>QR foreground</span>
                <input id="foregroundInput" type="color" value="#111827" aria-label="QR foreground color">
              </label>
              <label>
                <span>QR background</span>
                <input id="backgroundInput" type="color" value="#f8fafc" aria-label="QR background color">
              </label>
              <label class="checkbox-control transparent-control">
                <input id="transparentBackgroundInput" type="checkbox">
                <span>Transparent background</span>
              </label>
            </div>
          </div>
        </div>

        <aside class="preview-pane" aria-label="Generated QR code">
          <div class="preview-toolbar">
            <div class="stat-line" id="statLine" aria-live="polite">Ready</div>
            <button class="ghost-button" id="clearButton" type="button">Clear</button>
          </div>
          <div class="qr-stage" id="qrStage">
            <div id="qrCode" aria-live="polite"></div>
          </div>
          <ul class="scan-status" id="scanStatus" aria-live="polite"></ul>
          <p class="message" id="message" role="status"></p>
          <div class="share-link-panel">
            <label for="shareUrlInput">Share URL</label>
            <input id="shareUrlInput" type="text" readonly>
            <p class="field-help" id="shareUrlHelp">Share links preserve the current QR content and settings.</p>
          </div>
          <div class="actions">
            <button id="copyImageButton" type="button" title="Generate a QR code first">Copy Image</button>
            <button id="downloadSvgButton" type="button" title="Generate a QR code first">Download SVG</button>
            <button id="downloadPngButton" type="button" title="Generate a QR code first">Download PNG</button>
          </div>
          <div class="share-actions" id="shareActions" aria-label="Share view options" hidden>
            <button class="ghost-button" id="editSharedButton" type="button">Edit QR</button>
            <button class="ghost-button" id="makeYourOwnButton" type="button">New QR</button>
          </div>
        </aside>
      </section>
    </main>

    <script src="qrcode.js"></script>
    <script src="app.js"></script>
  </body>
</html>
